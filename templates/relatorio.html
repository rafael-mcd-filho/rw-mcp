<!DOCTYPE html>
<!--
  Template do relatório PDF. EDITE À VONTADE — cores, logo, seções.
  Os dados chegam em window.__DATA__ (injetado pelo render-pdf).
  Estrutura de __DATA__:
    { cliente, periodo, geradoEm, resumo:{gastoTotal, leads, conversas},
      campanhas:[{emoji,nome,categoria,gasto,headlineLabel,resultado,costLabel,custo}],
      serieDiaria:[{data,gasto,resultados}] }
-->
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --cor-primaria: #1877f2;   /* azul Meta — troque pela cor do cliente */
    --cor-texto: #1c1e21;
    --cor-suave: #65676b;
    --cor-borda: #e4e6eb;
    --cor-fundo-card: #f7f8fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--cor-texto);
    padding: 32px 36px;
    font-size: 13px;
  }
  header {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 3px solid var(--cor-primaria); padding-bottom: 14px; margin-bottom: 22px;
  }
  header h1 { font-size: 22px; color: var(--cor-primaria); }
  header .periodo { font-size: 13px; color: var(--cor-suave); margin-top: 4px; }
  header .gerado { font-size: 11px; color: var(--cor-suave); text-align: right; }

  .cards { display: flex; gap: 12px; margin-bottom: 24px; }
  .card {
    flex: 1; background: var(--cor-fundo-card); border: 1px solid var(--cor-borda);
    border-radius: 10px; padding: 14px 16px;
  }
  .card .label { font-size: 11px; color: var(--cor-suave); text-transform: uppercase; letter-spacing: .04em; }
  .card .valor { font-size: 22px; font-weight: 700; margin-top: 6px; }

  h2 { font-size: 14px; margin: 22px 0 10px; color: var(--cor-texto); }
  .chart-wrap { height: 220px; margin-bottom: 8px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--cor-borda); }
  th { background: var(--cor-fundo-card); font-size: 11px; text-transform: uppercase; color: var(--cor-suave); }
  td.num, th.num { text-align: right; }
  tr td:first-child { font-weight: 600; }

  footer { margin-top: 26px; font-size: 10px; color: var(--cor-suave); border-top: 1px solid var(--cor-borda); padding-top: 10px; }
</style>
</head>
<body>
  <header>
    <div>
      <h1 id="cliente"></h1>
      <div class="periodo" id="periodo"></div>
    </div>
    <div class="gerado" id="gerado"></div>
  </header>

  <div class="cards" id="cards"></div>

  <h2>Gasto e resultados por dia</h2>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>

  <h2>Campanhas</h2>
  <table>
    <thead>
      <tr>
        <th>Campanha</th><th>Objetivo</th>
        <th class="num">Investimento</th><th class="num">Resultado</th><th class="num">Custo/result.</th>
      </tr>
    </thead>
    <tbody id="linhas"></tbody>
  </table>

  <footer id="rodape"></footer>

<script>
  const D = window.__DATA__ || { campanhas: [], serieDiaria: [], resumo: {} };
  const money = n => "R$ " + (Number(n)||0).toLocaleString("pt-BR", {minimumFractionDigits:2, maximumFractionDigits:2});
  const intBR = n => (Number(n)||0).toLocaleString("pt-BR");

  document.getElementById("cliente").textContent = D.cliente || "Relatório Meta Ads";
  document.getElementById("periodo").textContent = "Período: " + (D.periodo || "");
  document.getElementById("gerado").textContent = "Gerado em " + (D.geradoEm || "");

  // Cards de resumo
  const cards = [
    { label: "Investimento total", valor: money(D.resumo.gastoTotal) },
    { label: "Leads (formulário)", valor: intBR(D.resumo.leads) },
    { label: "Conversas (WhatsApp)", valor: intBR(D.resumo.conversas) },
  ];
  document.getElementById("cards").innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${c.label}</div><div class="valor">${c.valor}</div></div>`
  ).join("");

  // Tabela de campanhas
  document.getElementById("linhas").innerHTML = (D.campanhas||[]).map(c =>
    `<tr>
      <td>${c.emoji||""} ${c.nome}</td>
      <td>${c.headlineLabel||c.categoria}</td>
      <td class="num">${money(c.gasto)}</td>
      <td class="num">${intBR(c.resultado)}</td>
      <td class="num">${c.resultado>0 ? money(c.custo) : "—"}</td>
    </tr>`
  ).join("");

  document.getElementById("rodape").textContent =
    "Dados da API de Marketing da Meta. Métricas de períodos recentes podem ser ajustadas pela atribuição (até ~72h).";

  // Gráfico: gasto (barra) + resultados (linha)
  const serie = D.serieDiaria || [];
  new Chart(document.getElementById("chart"), {
    data: {
      labels: serie.map(s => s.data),
      datasets: [
        { type: "bar", label: "Gasto (R$)", data: serie.map(s => s.gasto),
          backgroundColor: "rgba(24,119,242,.25)", borderColor: "#1877f2", borderWidth: 1, yAxisID: "y" },
        { type: "line", label: "Resultados", data: serie.map(s => s.resultados),
          borderColor: "#2e7d32", backgroundColor: "#2e7d32", tension: .3, yAxisID: "y1" },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      scales: {
        y: { position: "left", title: { display: true, text: "Gasto (R$)" } },
        y1: { position: "right", grid: { drawOnChartArea: false }, title: { display: true, text: "Resultados" } },
      },
    },
  });

  // Sinaliza ao Puppeteer que terminou de renderizar
  window.__READY__ = true;
</script>
</body>
</html>
